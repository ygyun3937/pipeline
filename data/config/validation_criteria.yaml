# QA 검증 기준 설정 파일 - 배터리 충방전 검사 장비
# API 재시작 없이 핫리로드로 변경사항이 즉시 반영됩니다.

version: "1.0"

reproducibility:
  required: true
  min_steps: 2
  environment_required: true

measurability:
  required: true
  quantitative_criteria_required: true   # 전압/전류/온도는 반드시 수치 기준 명시
  binary_verdict_required: true

acceptance_criteria:
  required: true
  explicit_criteria_required: true
  min_criteria_count: 2   # 합격/불합격 기준 + 측정 허용 오차 최소 2개

test_scope:
  level: "integration"   # unit | integration | e2e | all
  automation_required: false
  manual_acceptable: true

severity_overrides:
  Critical:
    automation_required: true
    min_steps: 1
    # Critical 알람(OVP, OCP, OTP)은 자동화 테스트 필수
  High:
    automation_required: false
    min_steps: 2
    quantitative_criteria_required: true
  Medium:
    manual_acceptable: true
    quantitative_criteria_required: false
  Low:
    manual_acceptable: true
    quantitative_criteria_required: false

custom_rules:
  - "전압 관련 알람(OVP/UVP)은 반드시 캘리브레이션 검증 단계를 포함해야 합니다."
  - "전류 관련 알람(OCP)은 inrush current 및 피크 전류 측정을 포함해야 합니다."
  - "온도 관련 알람(OTP)은 센서 오차 검증 및 실제 표면 온도 비교를 포함해야 합니다."
  - "셀 불균형 알람(CELL-BAL)은 EIS 측정 또는 셀별 전압 편차 정량 분석을 포함해야 합니다."
  - "Critical 알람은 동일 조건 3회 이상 재현 테스트가 필요합니다."
  - "BMS 통신 장애(COMM-FAIL)는 하드웨어 및 소프트웨어 양쪽 원인을 모두 검토해야 합니다."

report:
  language: "ko"
  filename_prefix: "QA_REPORT"
  sections:
    - "이슈 개요"
    - "테스트 가능성 평가"
    - "테스트 결과 요약"
    - "실패 케이스 상세"
    - "권장 테스트 케이스"
    - "결론 및 권고사항"
