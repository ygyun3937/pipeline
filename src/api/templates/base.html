<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Issue Pipeline{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                   "Noto Sans KR", sans-serif;
      background: #f5f7fa;
      color: #1e293b;
      min-height: 100vh;
    }

    nav {
      background: #1e293b;
      padding: 0 2rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    nav a { color: #e2e8f0; text-decoration: none; font-size: 0.95rem; }
    nav .brand { color: #fff; font-weight: 600; font-size: 1rem; margin-right: auto; }
    nav a:hover { color: #fff; }

    main {
      max-width: 780px;
      margin: 2.5rem auto;
      padding: 0 1.25rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
      padding: 2rem 2.5rem;
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #0f172a; margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.875rem; color: #64748b; margin-bottom: 2rem; }

    .form-row { margin-bottom: 1.25rem; }
    .form-row label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 0.375rem;
      letter-spacing: 0.01em;
    }
    .form-row label .req { color: #ef4444; margin-left: 2px; }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 0.5625rem 0.75rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 7px;
      font-size: 0.9rem;
      color: #1e293b;
      background: #fff;
      transition: border-color .15s;
      outline: none;
      font-family: inherit;
    }
    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }
    textarea { resize: vertical; min-height: 90px; }

    .domain-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .domain-tab {
      flex: 1;
      padding: 0.625rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: #64748b;
      background: #f8fafc;
      transition: all .15s;
      user-select: none;
    }
    .domain-tab:hover { border-color: #a5b4fc; color: #4f46e5; }
    .domain-tab.active {
      border-color: #6366f1;
      background: #eef2ff;
      color: #4338ca;
      font-weight: 600;
    }
    .domain-tab .tab-icon { display: block; font-size: 1.25rem; margin-bottom: 2px; }

    .section-divider {
      border: none;
      border-top: 1.5px solid #f1f5f9;
      margin: 1.5rem 0;
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin-bottom: 1rem;
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: 0.5rem;
      font-family: inherit;
    }
    .btn-submit:hover { background: #4338ca; }
    .btn-submit:active { background: #3730a3; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
    }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }

    .hidden { display: none !important; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <span class="brand">🗂 Issue Pipeline</span>
    <a href="/submit">이슈 등록</a>
    <a href="/docs" target="_blank">API 문서</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
