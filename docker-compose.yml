services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: issue_pipeline_db
    environment:
      POSTGRES_DB: issue_pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d issue_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
